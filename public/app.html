<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Complaint Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  display:flex;
  height:100vh;
  background:#0b1220;
  color:white;
  overflow:hidden;
}

body::before, body::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  filter:blur(60px);
  z-index:0;
}

body::before{
  background:radial-gradient(circle,#2563eb55,#0000);
  top:-100px;
  left:-100px;
}

body::after{
  background:radial-gradient(circle,#9333ea55,#0000);
  bottom:-120px;
  right:-120px;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:rgba(17,24,39,0.9);
  backdrop-filter: blur(12px);
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:12px;
  border-right:1px solid #1f2937;
  z-index:2;
}

.brand{
  font-size:20px;
  font-weight:700;
  color:#60a5fa;
}

.sidebar button{
  padding:10px;
  border:none;
  background:#1f2937;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

.sidebar button:hover{
  background:#2563eb;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
  overflow-y:auto;
  z-index:2;
}

.header{
  font-size:28px;
  font-weight:700;
}

.sub{
  font-size:13px;
  color:#94a3b8;
  margin-bottom:20px;
}

/* FORM */
input,textarea{
  width:100%;
  max-width:520px;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:#1f2937;
  color:white;
}

textarea{
  height:120px;
}

/* BUTTON */
.btn{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#4f46e5);
  color:white;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
  margin-top:20px;
}

/* CARD */
.card{
  background:#111827;
  border:1px solid #1f2937;
  padding:16px;
  border-radius:16px;
}

.title{
  font-weight:700;
}

.desc{
  font-size:13px;
  color:#cbd5e1;
  margin:8px 0;
}

.status{
  display:inline-block;
  padding:4px 10px;
  font-size:11px;
  border-radius:20px;
  background:orange;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.resolve{
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
  background:#16a34a;
  color:white;
  cursor:pointer;
}

.delete{
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
  background:#dc2626;
  color:white;
  cursor:pointer;
}

/* SECTIONS */
.section{display:none;}
.active{display:block;}
</style>
</head>

<body>

<div class="sidebar">
  <div class="brand">ComplaintSys</div>

  <button onclick="show('create')">➕ New Complaint</button>
  <button onclick="show('view')">📄 View Complaints</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<div class="main">

  <div class="header">Dashboard</div>
  <div class="sub">Complaint Management System</div>

  <!-- CREATE -->
  <div id="create" class="section active">
    <h3>Submit Complaint</h3>

    <input id="title" placeholder="Title">
    <textarea id="desc" placeholder="Description"></textarea>

    <button class="btn" onclick="add()">Submit</button>
  </div>

  <!-- VIEW -->
  <div id="view" class="section">
    <h3>All Complaints</h3>
    <div class="grid" id="list"></div>
  </div>

</div>

<script>

const role = localStorage.getItem("role");
const token = localStorage.getItem("token");

if(!role){
  window.location.href="login.html";
}

function show(page){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  if(page==='view') load();
}

/* ADD COMPLAINT */
async function add(){
  await fetch("/complaints", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization: token
    },
    body: JSON.stringify({
      title: title.value,
      description: desc.value
    })
  });

  title.value="";
  desc.value="";

  load();
}

/* LOAD */
async function load(){
  const res = await fetch("/complaints", {
    headers:{ Authorization: token }
  });

  const data = await res.json();

  list.innerHTML = data.map(c => `
    <div class="card">
      <div class="title">${c.title}</div>
      <div class="desc">${c.description}</div>

      <div class="status">${c.status}</div>

      ${role === "admin" ? `
        <div class="actions">
          <button class="resolve" onclick="resolve('${c._id}')">Resolve</button>
          <button class="delete" onclick="del('${c._id}')">Delete</button>
        </div>
      ` : ""}
    </div>
  `).join("");
}

/* RESOLVE */
async function resolve(id){
  await fetch("/complaints/" + id, {
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      Authorization: token
    },
    body: JSON.stringify({ status:"resolved" })
  });

  load();
}

/* DELETE */
async function del(id){
  await fetch("/complaints/" + id, {
    method:"DELETE",
    headers:{ Authorization: token }
  });

  load();
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

</script>

</body>
</html>
