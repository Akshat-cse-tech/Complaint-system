<!DOCTYPE html>
<html>
<head>
<title>User Dashboard</title>

<style>
body{font-family:Arial;margin:0;display:flex;}
.sidebar{width:200px;background:#111827;color:white;height:100vh;padding:20px;}
.main{flex:1;padding:20px;background:#f4f6f9;}
input,textarea{width:300px;padding:10px;margin:5px 0;}
button{padding:10px;background:#2563eb;color:white;border:none;}
.card{background:white;padding:10px;margin:10px 0;border-radius:10px;}
</style>
</head>

<body>

<div class="sidebar">
<h3>User Panel</h3>
</div>

<div class="main">

<h2>Add Complaint</h2>

<input id="title" placeholder="Title"><br>
<textarea id="desc" placeholder="Description"></textarea><br>

<button onclick="add()">Submit</button>

<h2>Your Complaints</h2>
<div id="list"></div>

</div>

<script>

async function add(){
  await fetch("/complaints",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      title:title.value,
      description:desc.value
    })
  });

  load();
}

async function load(){
  const res = await fetch("/complaints");
  const data = await res.json();

  list.innerHTML = data.map(c=>`
    <div class="card">
      <b>${c.title}</b>
      <p>${c.description}</p>
      <small>Status: ${c.status}</small>
    </div>
  `).join("");
}

load();

</script>

</body>
</html>
