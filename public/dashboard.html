<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
  display:flex;
}

.sidebar {
  width:220px;
  background:#111827;
  height:100vh;
  padding:20px;
}

.sidebar button {
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.sidebar button:hover {
  background:#2563eb;
  transform:translateX(5px);
}

.main {
  flex:1;
  padding:20px;
}

input {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#111827;
  color:white;
}

.addBtn {
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#22c55e,#2563eb);
  color:white;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:20px;
}

.card {
  background:#111827;
  padding:15px;
  border-radius:12px;
  transition:0.3s;
  animation:fade 0.3s ease;
}

.card:hover {
  transform:translateY(-5px);
  border:1px solid #2563eb;
}

.status {
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

.pending {background:orange;}
.resolved {background:green;}

.btn {
  margin-top:10px;
  padding:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.resolve {background:green;}
.delete {background:red;}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>ComplaintSys</h3>

  <button onclick="load()">All Complaints</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

  <h2>Dashboard</h2>

  <input id="title" placeholder="Title">
  <input id="desc" placeholder="Description">
  <button class="addBtn" onclick="add()">Add Complaint</button>

  <div class="grid" id="list"></div>

</div>

<script>
const token = localStorage.getItem("token");

async function load() {
  const res = await fetch("/complaints", {
    headers:{Authorization:token}
  });

  const data = await res.json();
<div style="margin-bottom:15px;">

  <input 
    id="searchBox" 
    placeholder="Search complaints..." 
    onkeyup="render()"
  />

  <select id="filterBox" onchange="render()">
    <option value="all">All</option>
    <option value="pending">Pending</option>
    <option value="resolved">Resolved</option>
  </select>

</div>
  list.innerHTML = data.map(c => `
    <div class="card">
      <h3>${c.title}</h3>
      <p>${c.description}</p>

      <span class="status ${c.status}">
        ${c.status}
      </span>

      <br>

      <button class="btn resolve" onclick="resolve('${c._id}')">Resolve</button>
      <button class="btn delete" onclick="del('${c._id}')">Delete</button>
    </div>
  `).join("");
}

async function add() {
  await fetch("/complaints", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:token
    },
    body:JSON.stringify({
      title:title.value,
      description:desc.value
    })
  });

  load();
}

async function resolve(id) {
  await fetch("/complaints/"+id,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      Authorization:token
    },
    body:JSON.stringify({status:"resolved"})
  });

  load();
}

async function del(id) {
  await fetch("/complaints/"+id,{
    method:"DELETE",
    headers:{Authorization:token}
  });

  load();
}

function logout() {
  localStorage.clear();
  window.location.href="/login.html";
}

load();
</script>

</body>
</html>
