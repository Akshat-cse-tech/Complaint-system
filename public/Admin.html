<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{margin:0;font-family:Arial;display:flex;}
.sidebar{width:220px;background:#111827;color:white;height:100vh;padding:20px;}
.main{flex:1;padding:20px;background:#f4f6f9;}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;}
button{padding:8px;margin:5px;border:none;cursor:pointer;}
.resolve{background:green;color:white;}
.delete{background:red;color:white;}
</style>
</head>

<body>

<div class="sidebar">
<h2>Admin</h2>
</div>

<div class="main">

<h2>All Complaints</h2>

<div id="list"></div>

</div>

<script>

async function load(){
  const res = await fetch("/complaints");
  const data = await res.json();

  list.innerHTML = data.map(c=>`
    <div class="card">
      <h3>${c.title}</h3>
      <p>${c.description}</p>
      <small>Status: ${c.status}</small><br>

      <button class="resolve" onclick="resolve('${c._id}')">Resolve</button>
      <button class="delete" onclick="del('${c._id}')">Delete</button>
    </div>
  `).join("");
}

async function resolve(id){
  await fetch("/complaints/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({status:"resolved"})
  });
  load();
}

async function del(id){
  await fetch("/complaints/"+id,{method:"DELETE"});
  load();
}

load();

</script>

</body>
</html>
